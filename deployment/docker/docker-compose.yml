version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ups-monitor-db
    environment:
      POSTGRES_DB: ups_monitor
      POSTGRES_USER: ups_admin
      POSTGRES_PASSWORD: secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ups_admin -d ups_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ups-monitor:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: ups-monitor-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ups_monitor
      DB_USER: ups_admin
      DB_PASSWORD: secure_password
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  app_logs:
